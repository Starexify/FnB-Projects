<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./assets/images/icon.png">
  <title>F&B Wikis Hub</title>
  <script src="lib/UIController.js"></script>
  <script type="module" src="./ui_elements/wikiCard.js" defer></script>
  <link href="./output.css" rel="stylesheet" />
</head>

<body class="bg-gray-900 text-white">
<nav data-ui="nav-bar" class="navbar"></nav>

<div class="flex flex-col items-center py-8">
  <h1 class="header">Wikis</h1>
  <p class="text-slate-400 text-lg text-center max-w-2xl">
    The hub for all our projects’ information and documentation in one place.
  </p>
</div>

<div class="grid xl:grid-cols-3 md:grid-cols-2 gap-6 p-5 md:px-24 justify-center">
  <!-- Mods -->
  <wiki-card id="bsr" wiki-id="big-swords-r" modId="big-swords-r" description="Comprehensive guide to all Big Swords R mechanics, items, and progression.">
    Big Swords R
  </wiki-card>

  <wiki-card id="cosmicore" wiki-id="cosmicore" modId="cosmicore" description="Learn everything about meteors, cosmic stones, and new worldgen." wip>
    Cosmicore
  </wiki-card>

  <wiki-card id="hgr" wiki-id="hexxit-gear-r" modId="hexxit-gear-r" description="Everything about Hexxit Gear R armor sets and crafting." wip>
    Hexxit Gear R
  </wiki-card>

  <wiki-card id="tmml" wiki-id="tmml" modId="tmml" icon-src="assets/images/icons/tmml.gif" description="Transport Modules: Modular Logistics wiki covering modular logistics networks and setup.">
    Transport Modules: Modular Logistics
  </wiki-card>

  <wiki-card id="mystic_shrubs" wiki-id="mystic-shrubs" modId="mystic-shrubs" description="Mystic Shrubs spawning, loot tables, and usage tips." wip>
    Mystic Shrubs
  </wiki-card>

  <wiki-card id="realitymod" wiki-id="realitymod" modId="realitymod" description="Biome, mob, and mechanic overhaul documentation." wip>
    RealityMod
  </wiki-card>

  <wiki-card id="nmt" wiki-id="nmt" modId="nmt" description="Details about the mysterious 'No More Things' mod." wip>
    No More Things
  </wiki-card>

  <!-- Addons -->
  <wiki-card id="bsrxcc" wiki-id="bsrxcc" modId="bsrxcc" description="Compatibility wiki for Big Swords R x Cosmicore." wip>
    Big Swords R x Cosmicore
  </wiki-card>

  <wiki-card id="hgw" wiki-id="hgw" modId="hgw" description="Weapons add-on for Hexxit Gear R with unique weapon crafting." wip>
    Hexxit Gear Weaponry
  </wiki-card>

  <!--"Coming Soon" card at the end -->
  <div class="bg-gray-800/90 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-700 xl:w-110 overflow-hidden flex items-center justify-center">
    <div class="bg-gray-800 rounded-xl p-6">
      <img src="assets/images/coming_soon.png" alt="More Wikis Coming Soon" class="w-full h-auto object-contain">
    </div>
  </div>
</div>

<div data-ui="scroll-button" class="scroll-button"></div>
<footer data-ui="footer" class="bg-white dark:bg-gray-900 w-full"></footer>
</body>
</html>
